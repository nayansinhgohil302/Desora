<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Desora - Cactus Leather</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        header {
            background-color: #1e3d2f;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background-color: #285943;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        .hero {
            background: url('https://images.unsplash.com/photo-1606813909022-8c55b6c04f5f') no-repeat center/cover;
            height: 300px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
        }

        .products {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 40px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            padding: 15px;
            width: 250px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card img {
            width: 100%;
            border-radius: 10px;
        }

        .card h3 {
            margin: 10px 0;
        }

        .btn {
            background-color: #1e3d2f;
            color: white;
            padding: 10px 15px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        footer {
            background-color: #1e3d2f;
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>
<body>

<header>
    <h1>Desora</h1>
    <p>Premium Cactus Leather Products</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Products</a>
    <a href="#">Contact</a>
</nav>

<div class="hero">
    Eco-Friendly Style ??
</div>

<section class="products">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1585386959984-a4155223163d">
        <h3>Wallet</h3>
        <p>Stylish cactus leather wallet.</p>
        <button class="btn">Buy Now</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1590874103328-eac38a683ce7">
        <h3>Belt</h3>
        <p>Durable and eco-friendly belt.</p>
        <button class="btn">Buy Now</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1627123424574-724758594e93">
        <h3>MagSafe Card Holder</h3>
        <p>Sleek magnetic card holder.</p>
        <button class="btn">Buy Now</button>
    </div>

</section>

<footer>
    <p>© 2026 Desora | Sustainable Fashion</p>
</footer>

</body>
</html>
